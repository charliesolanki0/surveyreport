@import "tailwindcss" source(none);
@source "../src";
@import "tw-animate-css";

@custom-variant dark (&:is(.dark *));

@theme inline {
  --radius-sm: calc(var(--radius) - 4px);
  --radius-md: calc(var(--radius) - 2px);
  --radius-lg: var(--radius);
  --radius-xl: calc(var(--radius) + 4px);
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-popover: var(--popover);
  --color-popover-foreground: var(--popover-foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-secondary: var(--secondary);
  --color-secondary-foreground: var(--secondary-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-accent: var(--accent);
  --color-accent-foreground: var(--accent-foreground);
  --color-destructive: var(--destructive);
  --color-destructive-foreground: var(--destructive-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-ring: var(--ring);
  --color-navy: var(--navy);
  --color-navy-foreground: var(--navy-foreground);
  --color-success: var(--success);
  --color-warning: var(--warning);
  --color-critical: var(--critical);
  --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-serif: "Instrument Serif", ui-serif, Georgia, serif;
}

:root {
  --radius: 0.5rem;

  /* Dark navy and white scheme */
  --background: oklch(0.99 0.005 250);
  --foreground: oklch(0.18 0.04 260);

  --navy: oklch(0.22 0.05 260);
  --navy-foreground: oklch(0.98 0.005 250);

  --card: oklch(1 0 0);
  --card-foreground: oklch(0.18 0.04 260);
  --popover: oklch(1 0 0);
  --popover-foreground: oklch(0.18 0.04 260);

  --primary: oklch(0.22 0.05 260);
  --primary-foreground: oklch(0.98 0.005 250);

  --secondary: oklch(0.96 0.008 250);
  --secondary-foreground: oklch(0.22 0.05 260);

  --muted: oklch(0.96 0.008 250);
  --muted-foreground: oklch(0.5 0.02 260);

  --accent: oklch(0.95 0.015 250);
  --accent-foreground: oklch(0.22 0.05 260);

  --destructive: oklch(0.55 0.22 27);
  --destructive-foreground: oklch(0.98 0.005 250);

  --border: oklch(0.91 0.01 255);
  --input: oklch(0.91 0.01 255);
  --ring: oklch(0.22 0.05 260);

  --success: oklch(0.62 0.15 155);
  --warning: oklch(0.75 0.16 75);
  --critical: oklch(0.55 0.22 27);
}

@layer base {
  * {
    border-color: var(--color-border);
  }
  body {
    background-color: var(--color-background);
    color: var(--color-foreground);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, h4 {
    letter-spacing: -0.02em;
  }
}
